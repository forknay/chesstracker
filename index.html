<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chess Tracker Terminal</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3.0.0/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
<style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0e17;
  --bg-panel: #0d1117;
  --bg-panel-header: #161b22;
  --bg-row-hover: #1a2332;
  --bg-row-alt: #0f1419;
  --text-primary: #c9d1d9;
  --text-bright: #e6edf3;
  --text-dim: #6e7681;
  --green: #00ff41;
  --green-dim: #238636;
  --amber: #ffb700;
  --red: #ff4444;
  --cyan: #58a6ff;
  --white: #ffffff;
  --border: #21262d;
  --border-bright: #30363d;
  --font-mono: 'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'SF Mono', 'Consolas', 'Liberation Mono', monospace;
}

body {
  background: var(--bg-primary);
  color: var(--text-primary);
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.4;
  overflow: hidden;
  height: 100vh;
}

/* ===== HEADER ===== */
#header {
  background: var(--bg-panel-header);
  color: var(--green);
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 12px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  letter-spacing: 2px;
}
.header-title { font-weight: bold; }
.header-clock { color: var(--amber); font-size: 12px; letter-spacing: 1px; }
.header-refresh { color: var(--text-dim); font-size: 11px; letter-spacing: 0; display: flex; align-items: center; gap: 6px; }

/* ===== DASHBOARD GRID ===== */
#dashboard {
  display: grid;
  grid-template-columns: 260px 1fr 340px;
  grid-template-rows: 1fr 300px;
  gap: 1px;
  background: var(--border);
  height: calc(100vh - 60px);
}
#panel-roster { grid-column: 1; grid-row: 1; }
#panel-charts { grid-column: 2; grid-row: 1; }
#panel-games { grid-column: 3; grid-row: 1; }
#panel-ratings { grid-column: 1 / span 2; grid-row: 2; }
#panel-performance { grid-column: 3; grid-row: 2; }

/* ===== PANELS ===== */
.panel {
  background: var(--bg-panel);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.panel-header {
  background: var(--bg-panel-header);
  color: var(--amber);
  font-size: 11px;
  font-weight: bold;
  letter-spacing: 1px;
  text-transform: uppercase;
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  flex-shrink: 0;
}
.panel-body {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

/* ===== SCROLLBAR ===== */
.panel-body::-webkit-scrollbar { width: 4px; }
.panel-body::-webkit-scrollbar-track { background: var(--bg-panel); }
.panel-body::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

/* ===== BLINK ===== */
@keyframes blink {
  0%, 49% { opacity: 1; }
  50%, 100% { opacity: 0; }
}
.blink { animation: blink 1.2s infinite; color: var(--green); font-size: 9px; }
.fetching { color: var(--amber); animation: none; }

/* ===== PLAYER ROSTER ===== */
.roster-card {
  padding: 8px;
  border-bottom: 1px solid var(--border);
}
.roster-card:hover { background: var(--bg-row-hover); }
.roster-top { display: flex; gap: 8px; align-items: flex-start; }
.avatar {
  width: 36px; height: 36px;
  border-radius: 3px;
  border: 1px solid var(--border-bright);
  flex-shrink: 0;
  object-fit: cover;
}
.avatar-placeholder {
  width: 36px; height: 36px;
  border-radius: 3px;
  border: 1px solid var(--border-bright);
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-row-alt);
  color: var(--text-dim);
  font-size: 14px; font-weight: bold;
}
.roster-info { min-width: 0; flex: 1; }
.roster-name { color: var(--text-bright); font-size: 12px; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.roster-username { color: var(--text-dim); font-size: 10px; }
.roster-meta { color: var(--text-dim); font-size: 10px; margin-top: 2px; }
.roster-status { font-size: 10px; margin-top: 4px; display: flex; align-items: center; gap: 4px; }
.roster-status.online { color: var(--green); }
.roster-status.offline { color: var(--text-dim); }
.status-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%;
}
.status-dot.online { background: var(--green); box-shadow: 0 0 4px var(--green); }
.status-dot.offline { background: var(--text-dim); }
.title-badge {
  background: var(--amber);
  color: #000;
  padding: 0 4px;
  font-size: 9px;
  font-weight: bold;
  border-radius: 2px;
  margin-right: 4px;
}
.roster-error { color: var(--red); font-size: 10px; margin-top: 4px; }

/* ===== RATINGS MATRIX ===== */
.matrix-table { width: 100%; border-collapse: collapse; font-size: 12px; }
.matrix-table th {
  text-align: left;
  color: var(--amber);
  font-size: 10px;
  letter-spacing: 1px;
  padding: 4px 8px;
  border-bottom: 1px solid var(--border-bright);
  position: sticky; top: 0;
  background: var(--bg-panel);
  z-index: 1;
}
.matrix-table td {
  padding: 6px 8px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
.matrix-table tr:hover td { background: var(--bg-row-hover); }
.rating-best { color: var(--amber); font-weight: bold; }
.rating-cell .best { color: var(--text-dim); font-size: 10px; }
.delta-up { color: var(--green); font-size: 10px; font-weight: bold; }
.delta-down { color: var(--red); font-size: 10px; font-weight: bold; }
.delta-zero { color: var(--text-dim); font-size: 10px; }
.green { color: var(--green); }
.red { color: var(--red); }
.dim { color: var(--text-dim); }
.player-col { color: var(--cyan); font-weight: bold; max-width: 140px; overflow: hidden; text-overflow: ellipsis; }

/* ===== RECENT GAMES ===== */
.game-entry {
  padding: 6px 4px;
  border-bottom: 1px solid var(--border);
  font-size: 11px;
}
.game-entry:hover { background: var(--bg-row-hover); }
.game-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2px; }
.format-badge {
  font-size: 9px;
  padding: 1px 4px;
  border: 1px solid var(--border-bright);
  color: var(--text-dim);
  border-radius: 2px;
  letter-spacing: 1px;
}
.game-players { font-size: 11px; margin-bottom: 2px; }
.game-result { font-weight: bold; font-size: 11px; }

/* ===== CHART TABS ===== */
#chart-tabs, #chart-range-tabs { display: flex; gap: 2px; }
.tab {
  cursor: pointer;
  padding: 2px 8px;
  color: var(--text-dim);
  border: 1px solid transparent;
  font-size: 10px;
  font-family: var(--font-mono);
  background: none;
  letter-spacing: 1px;
}
.tab:hover { color: var(--text-primary); }
.tab.active { color: var(--green); border-color: var(--green); }
.chart-controls { display: flex; gap: 12px; align-items: center; }
.chart-controls-separator { color: var(--border-bright); font-size: 14px; }
#charts-body { padding: 8px; position: relative; }
#rating-chart { width: 100% !important; height: 100% !important; }

/* ===== PERFORMANCE SUMMARY ===== */
.perf-section { margin-bottom: 12px; }
.perf-title {
  color: var(--amber);
  font-size: 10px;
  letter-spacing: 1px;
  font-weight: bold;
  margin-bottom: 4px;
  border-bottom: 1px solid var(--border);
  padding-bottom: 2px;
}
.perf-row {
  display: flex;
  align-items: center;
  padding: 2px 0;
  font-size: 11px;
  gap: 6px;
}
.perf-name { width: 130px; color: var(--cyan); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex-shrink: 0; }
.amber { color: var(--amber); }
.win-bar {
  display: inline-block;
  width: 70px; height: 8px;
  background: var(--bg-row-alt);
  border: 1px solid var(--border);
  margin-left: auto;
  flex-shrink: 0;
}
.win-bar-fill { height: 100%; background: var(--green); }

/* ===== STATUS BAR ===== */
#status-bar {
  background: var(--bg-panel-header);
  color: var(--text-dim);
  height: 24px;
  display: flex;
  align-items: center;
  padding: 0 12px;
  border-top: 1px solid var(--border);
  font-size: 10px;
  gap: 20px;
}

/* ===== LOADING ===== */
.loading-text { color: var(--text-dim); font-size: 11px; padding: 8px; }
@keyframes pulse { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
.loading-text { animation: pulse 1.5s ease-in-out infinite; }

/* ===== RESPONSIVE ===== */
@media (max-width: 1200px) {
  #dashboard {
    grid-template-columns: 1fr;
    grid-template-rows: auto;
    overflow-y: auto;
  }
  #panel-roster, #panel-ratings, #panel-games, #panel-charts, #panel-performance {
    grid-column: 1;
    min-height: 280px;
  }
  body { overflow: auto; }
}
</style>
</head>
<body>
<header id="header">
  <div class="header-title">CHESS TRACKER TERMINAL</div>
  <div id="header-clock" class="header-clock"></div>
  <div class="header-refresh">
    <span class="blink" id="refresh-indicator">*</span>
    REFRESH: <span id="refresh-countdown">--</span>s
  </div>
</header>

<main id="dashboard">
  <section id="panel-roster" class="panel">
    <div class="panel-header">Player Roster</div>
    <div class="panel-body" id="roster-body"><div class="loading-text">Loading players...</div></div>
  </section>
  <section id="panel-ratings" class="panel">
    <div class="panel-header">Ratings Matrix</div>
    <div class="panel-body" id="ratings-body"><div class="loading-text">Loading ratings...</div></div>
  </section>
  <section id="panel-games" class="panel">
    <div class="panel-header">Recent Games <span class="blink">LIVE</span></div>
    <div class="panel-body" id="games-body"><div class="loading-text">Loading games...</div></div>
  </section>
  <section id="panel-charts" class="panel">
    <div class="panel-header">
      Rating History
      <div class="chart-controls">
        <div id="chart-tabs">
          <span class="tab active" data-format="chess_bullet">BULLET</span>
          <span class="tab" data-format="chess_blitz">BLITZ</span>
          <span class="tab" data-format="chess_rapid">RAPID</span>
          <span class="tab" data-format="chess_daily">DAILY</span>
        </div>
        <span class="chart-controls-separator">|</span>
        <div id="chart-range-tabs">
          <span class="tab" data-range="1">1D</span>
          <span class="tab" data-range="7">1W</span>
          <span class="tab" data-range="30">1M</span>
          <span class="tab" data-range="365">1Y</span>
          <span class="tab active" data-range="all">ALL</span>
        </div>
      </div>
    </div>
    <div class="panel-body" id="charts-body">
      <canvas id="rating-chart"></canvas>
    </div>
  </section>
  <section id="panel-performance" class="panel">
    <div class="panel-header">Performance Summary</div>
    <div class="panel-body" id="performance-body"><div class="loading-text">Loading stats...</div></div>
  </section>
</main>

<footer id="status-bar">
  <span>API CALLS: 0</span>
  <span>CACHE: --</span>
  <span>ERRORS: 0</span>
  <span>NEXT REFRESH: --</span>
</footer>

<script>
// ===== CONFIGURATION =====
const PLAYERS = [
  'Juulyang', 'melonfromthestreets', 'XxVladiatorxX24',
  'TofuTurtle', 'NemoTheIguana', 'Jumoysorcier'
];
const API_BASE = 'https://api.chess.com/pub';
const REFRESH_INTERVAL_MS = 120000;
const ARCHIVE_REFRESH_MS = 600000;
const ARCHIVE_MONTHS = 6;
const CACHE_VERSION = 'v2';
const FORMATS = ['chess_bullet', 'chess_blitz', 'chess_rapid', 'chess_daily'];
const FORMAT_LABELS = { chess_bullet: 'BULLET', chess_blitz: 'BLITZ', chess_rapid: 'RAPID', chess_daily: 'DAILY' };
const PLAYER_COLORS = ['#00ff41', '#ffb700', '#58a6ff', '#ff6b6b', '#c084fc', '#34d399'];

// ===== STATE =====
const state = {
  players: {},
  apiCallCount: 0,
  errors: [],
  lastRefresh: null,
  archivesLoading: false,
  selectedChartFormat: 'chess_bullet',
  selectedChartRange: 'all'
};

let nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;
let chartInstance = null;

// ===== UTILITIES =====
function escapeHtml(str) {
  if (!str) return '';
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function truncate(str, max) {
  if (!str) return '';
  return str.length > max ? str.slice(0, max - 1) + '\u2026' : str;
}

function formatTimeAgo(unixSec) {
  const diff = Math.floor(Date.now() / 1000 - unixSec);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

function formatDateTime(unixSec) {
  const d = new Date(unixSec * 1000);
  const mo = String(d.getMonth() + 1).padStart(2, '0');
  const da = String(d.getDate()).padStart(2, '0');
  const hr = String(d.getHours()).padStart(2, '0');
  const mi = String(d.getMinutes()).padStart(2, '0');
  return mo + '/' + da + ' ' + hr + ':' + mi;
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function isWin(result) { return result === 'win'; }
function isLoss(result) { return ['checkmated', 'resigned', 'timeout', 'abandoned', 'lose'].includes(result); }

// ===== API FETCH LAYER =====
async function apiFetch(url) {
  state.apiCallCount++;
  updateStatusBar();
  try {
    const res = await fetch(url);
    if (res.status === 429) {
      await sleep(2000);
      state.apiCallCount++;
      const retry = await fetch(url);
      if (!retry.ok) throw new Error('API ' + retry.status);
      return retry.json();
    }
    if (res.status === 404) return null;
    if (!res.ok) throw new Error('API ' + res.status);
    return res.json();
  } catch (err) {
    throw err;
  }
}

// ===== LOCAL STORAGE CACHE =====
function getCacheKey(username) { return 'chess_' + CACHE_VERSION + '_' + username; }
function getGamesCacheKey(username) { return 'chessgames_' + CACHE_VERSION + '_' + username; }

function saveArchiveCache(username, ratingHistory, recentGames) {
  try {
    localStorage.setItem(getCacheKey(username), JSON.stringify({ timestamp: Date.now(), data: ratingHistory }));
    localStorage.setItem(getGamesCacheKey(username), JSON.stringify({ timestamp: Date.now(), data: recentGames }));
  } catch (e) { /* quota exceeded - ignore */ }
}

function loadArchiveCache(username) {
  try {
    const raw = localStorage.getItem(getCacheKey(username));
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

function loadGamesCache(username) {
  try {
    const raw = localStorage.getItem(getGamesCacheKey(username));
    return raw ? JSON.parse(raw) : null;
  } catch (e) { return null; }
}

// ===== DATA FETCHING =====
async function fetchProfilesAndStats() {
  const ind = document.getElementById('refresh-indicator');
  if (ind) { ind.textContent = '~'; ind.classList.add('fetching'); }

  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    try {
      const profile = await apiFetch(API_BASE + '/player/' + key);
      const stats = await apiFetch(API_BASE + '/player/' + key + '/stats');
      if (!state.players[key]) state.players[key] = {};
      state.players[key].profile = profile;
      state.players[key].stats = stats;
      state.players[key].lastUpdated = Date.now();
      state.players[key].error = null;
    } catch (err) {
      if (!state.players[key]) state.players[key] = {};
      state.players[key].error = err.message;
      state.errors.push({ time: Date.now(), msg: key + ': ' + err.message });
    }
    renderRoster();
    renderRatingsMatrix();
    renderPerformance();
  }

  state.lastRefresh = Date.now();
  nextRefreshTime = Date.now() + REFRESH_INTERVAL_MS;
  if (ind) { ind.textContent = '*'; ind.classList.remove('fetching'); }
  updateStatusBar();
}

async function fetchArchives() {
  state.archivesLoading = true;
  updateStatusBar();

  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    try {
      // Check cache freshness
      const cached = loadArchiveCache(key);
      const cachedGames = loadGamesCache(key);
      if (cached && cachedGames && (Date.now() - cached.timestamp < ARCHIVE_REFRESH_MS)) {
        if (!state.players[key]) state.players[key] = {};
        state.players[key].ratingHistory = cached.data;
        state.players[key].recentGames = cachedGames.data;
        state.players[key].archivesLoaded = true;
        renderChart();
        renderRecentGames();
        continue;
      }

      const archiveList = await apiFetch(API_BASE + '/player/' + key + '/games/archives');
      if (!archiveList || !archiveList.archives || archiveList.archives.length === 0) continue;

      const recentArchives = archiveList.archives.slice(-ARCHIVE_MONTHS);
      const ratingHistory = { chess_bullet: [], chess_blitz: [], chess_rapid: [], chess_daily: [] };
      const recentGamesCollector = [];

      for (const archiveUrl of recentArchives) {
        const monthData = await apiFetch(archiveUrl);
        if (!monthData || !monthData.games) continue;

        for (const game of monthData.games) {
          const fmt = 'chess_' + game.time_class;
          const isWhite = game.white.username.toLowerCase() === key;
          const playerSide = isWhite ? game.white : game.black;
          const opponentSide = isWhite ? game.black : game.white;

          if (ratingHistory[fmt]) {
            ratingHistory[fmt].push({ date: game.end_time, rating: playerSide.rating, result: playerSide.result });
          }

          recentGamesCollector.push({
            date: game.end_time,
            result: playerSide.result,
            playerRating: playerSide.rating,
            opponentUsername: opponentSide.username,
            opponentRating: opponentSide.rating,
            format: game.time_class,
            url: game.url
          });
        }
      }

      if (!state.players[key]) state.players[key] = {};
      state.players[key].ratingHistory = ratingHistory;
      state.players[key].recentGames = recentGamesCollector.sort((a, b) => b.date - a.date).slice(0, 30);
      state.players[key].archivesLoaded = true;
      saveArchiveCache(key, ratingHistory, state.players[key].recentGames);

    } catch (err) {
      state.errors.push({ time: Date.now(), msg: 'Archives ' + key + ': ' + err.message });
    }

    // Render progressively after each player
    renderChart();
    renderRecentGames();
  }

  state.archivesLoading = false;
  updateStatusBar();
}

// ===== RENDER: ROSTER =====
function renderRoster() {
  const el = document.getElementById('roster-body');
  let html = '';
  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const p = state.players[key];
    if (!p || !p.profile) {
      html += '<div class="roster-card"><div class="loading-text">Loading ' + escapeHtml(username) + '...</div></div>';
      continue;
    }
    const prof = p.profile;
    const isOnline = prof.last_online && (Date.now() / 1000 - prof.last_online) < 300;
    const onlineClass = isOnline ? 'online' : 'offline';
    const onlineText = isOnline ? 'ONLINE' : (prof.last_online ? formatTimeAgo(prof.last_online) : 'UNKNOWN');
    const title = prof.title ? '<span class="title-badge">' + escapeHtml(prof.title) + '</span>' : '';
    const avatarEl = prof.avatar
      ? '<img src="' + escapeHtml(prof.avatar) + '" class="avatar" alt="">'
      : '<div class="avatar-placeholder">' + escapeHtml(username[0].toUpperCase()) + '</div>';
    const name = prof.name || username;
    const league = prof.league || '-';
    const status = prof.status || '-';

    html += '<div class="roster-card"><div class="roster-top">' + avatarEl +
      '<div class="roster-info"><div class="roster-name">' + title + escapeHtml(name) + '</div>' +
      '<div class="roster-username">@' + escapeHtml(prof.username) + '</div>' +
      '<div class="roster-meta">' + escapeHtml(status) + ' | ' + escapeHtml(league) + '</div></div></div>' +
      '<div class="roster-status ' + onlineClass + '"><span class="status-dot ' + onlineClass + '"></span> ' + onlineText + '</div>';

    if (p.error) {
      html += '<div class="roster-error">ERR: ' + escapeHtml(p.error) + '</div>';
    }
    html += '</div>';
  }
  el.innerHTML = html;
}

// ===== RENDER: RATINGS MATRIX =====
function renderRatingsMatrix() {
  const el = document.getElementById('ratings-body');
  const range = state.selectedChartRange;
  var cutoffSec = 0;
  if (range !== 'all') {
    var days = parseInt(range, 10);
    cutoffSec = Math.floor(Date.now() / 1000) - days * 86400;
  }
  var rangeLabel = range === 'all' ? 'ALL' : range === '1' ? '1D' : range === '7' ? '1W' : range === '30' ? '1M' : '1Y';

  let html = '<table class="matrix-table"><thead><tr>' +
    '<th>PLAYER</th><th>BULLET</th><th>BLITZ</th><th>RAPID</th><th>DAILY</th><th>W/L/D (' + rangeLabel + ')</th>' +
    '</tr></thead><tbody>';

  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const p = state.players[key];
    if (!p || !p.stats) {
      html += '<tr><td colspan="6" class="dim">' + escapeHtml(username) + ' -- loading...</td></tr>';
      continue;
    }
    const s = p.stats;
    const hist = p.ratingHistory || {};
    html += '<tr><td class="player-col">' + escapeHtml(truncate(username, 16)) + '</td>';

    let totalW = 0, totalL = 0, totalD = 0;
    let bestRating = 0, bestFormat = '';
    for (const fmt of FORMATS) {
      const r = s[fmt] && s[fmt].last ? s[fmt].last.rating : 0;
      if (r > bestRating) { bestRating = r; bestFormat = fmt; }
    }

    for (const fmt of FORMATS) {
      const fmtData = s[fmt];
      if (!fmtData || !fmtData.last) {
        html += '<td class="dim">-</td>';
      } else {
        const rating = fmtData.last.rating;
        const cls = (fmt === bestFormat) ? 'rating-best' : '';

        // Compute delta from ratingHistory for the selected time range
        var deltaHtml = '';
        var fmtHist = hist[fmt];
        if (fmtHist && fmtHist.length > 0) {
          var filtered = fmtHist;
          if (cutoffSec > 0) {
            filtered = fmtHist.filter(function(pt) { return pt.date >= cutoffSec; });
          }
          if (filtered.length > 0) {
            var sorted = filtered.slice().sort(function(a, b) { return a.date - b.date; });
            var startRating = sorted[0].rating;
            var endRating = sorted[sorted.length - 1].rating;
            var delta = endRating - startRating;
            if (delta > 0) {
              deltaHtml = ' <span class="delta-up">+' + delta + '</span>';
            } else if (delta < 0) {
              deltaHtml = ' <span class="delta-down">' + delta + '</span>';
            } else {
              deltaHtml = ' <span class="delta-zero">0</span>';
            }
          }
        }

        html += '<td class="rating-cell ' + cls + '">' + rating + deltaHtml + '</td>';

        // Count W/L/D for the selected time range
        if (fmtHist && cutoffSec > 0) {
          var rangeGames = fmtHist.filter(function(pt) { return pt.date >= cutoffSec; });
          for (var gi = 0; gi < rangeGames.length; gi++) {
            var r = rangeGames[gi].result;
            if (r === 'win') totalW++;
            else if (isLoss(r)) totalL++;
            else totalD++;
          }
        } else if (fmtHist && cutoffSec === 0) {
          // "all" range -- use archive data if available, otherwise fall back to stats
          for (var gi = 0; gi < fmtHist.length; gi++) {
            var r = fmtHist[gi].result;
            if (r === 'win') totalW++;
            else if (isLoss(r)) totalL++;
            else totalD++;
          }
        } else if (fmtData.record) {
          totalW += fmtData.record.win || 0;
          totalL += fmtData.record.loss || 0;
          totalD += fmtData.record.draw || 0;
        }
      }
    }

    html += '<td><span class="green">' + totalW + '</span>/<span class="red">' + totalL + '</span>/<span class="dim">' + totalD + '</span></td>';
    html += '</tr>';
  }
  html += '</tbody></table>';
  el.innerHTML = html;
}

// ===== RENDER: RECENT GAMES =====
function renderRecentGames() {
  const el = document.getElementById('games-body');
  const allGames = [];
  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const p = state.players[key];
    if (!p || !p.recentGames) continue;
    for (const g of p.recentGames) {
      allGames.push(Object.assign({}, g, { player: username }));
    }
  }
  allGames.sort(function(a, b) { return b.date - a.date; });
  const display = allGames.slice(0, 50);

  if (display.length === 0) {
    el.innerHTML = '<div class="loading-text">Loading games...</div>';
    return;
  }

  let html = '';
  for (const g of display) {
    const time = formatDateTime(g.date);
    const resultClass = isWin(g.result) ? 'green' : isLoss(g.result) ? 'red' : 'dim';
    const resultText = (g.result || '').toUpperCase().replace('CHECKMATED', 'LOSS').replace('RESIGNED', 'LOSS').replace('TIMEOUT', 'TIMEOUT').replace('ABANDONED', 'LOSS');
    const formatLabel = (g.format || '').toUpperCase();

    html += '<div class="game-entry">' +
      '<div class="game-header"><span class="dim">' + time + '</span><span class="format-badge">' + formatLabel + '</span></div>' +
      '<div class="game-players"><span class="green">' + escapeHtml(g.player) + '</span> <span class="dim">(' + g.playerRating + ')</span>' +
      ' vs <span>' + escapeHtml(g.opponentUsername) + '</span> <span class="dim">(' + g.opponentRating + ')</span></div>' +
      '<div class="game-result ' + resultClass + '">' + escapeHtml(resultText) + '</div></div>';
  }
  el.innerHTML = html;
}

// ===== RENDER: CHART =====
function initChart() {
  const ctx = document.getElementById('rating-chart').getContext('2d');
  chartInstance = new Chart(ctx, {
    type: 'line',
    data: { datasets: [] },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      interaction: { mode: 'nearest', intersect: false },
      scales: {
        x: {
          type: 'time',
          time: { unit: 'week', tooltipFormat: 'MMM d, yyyy' },
          grid: { color: '#21262d' },
          ticks: { color: '#6e7681', font: { family: 'monospace', size: 10 }, maxTicksLimit: 12 }
        },
        y: {
          grid: { color: '#21262d' },
          ticks: { color: '#6e7681', font: { family: 'monospace', size: 10 } }
        }
      },
      plugins: {
        legend: {
          labels: { color: '#c9d1d9', font: { family: 'monospace', size: 11 }, boxWidth: 12 }
        },
        tooltip: {
          backgroundColor: '#161b22', borderColor: '#30363d', borderWidth: 1,
          titleFont: { family: 'monospace', size: 11 }, bodyFont: { family: 'monospace', size: 11 }
        }
      }
    }
  });
}

function renderChart() {
  if (!chartInstance) return;
  const format = state.selectedChartFormat;
  const range = state.selectedChartRange;
  const datasets = [];

  // Compute the cutoff timestamp based on range
  var cutoff = 0;
  if (range !== 'all') {
    var days = parseInt(range, 10);
    cutoff = Date.now() - days * 86400 * 1000;
  }

  // Pick x-axis time unit based on range
  var timeUnit = 'month';
  if (range === '1') timeUnit = 'hour';
  else if (range === '7') timeUnit = 'day';
  else if (range === '30') timeUnit = 'day';
  else if (range === '365') timeUnit = 'month';
  else timeUnit = 'month';

  for (let i = 0; i < PLAYERS.length; i++) {
    const key = PLAYERS[i].toLowerCase();
    const p = state.players[key];
    if (!p || !p.ratingHistory || !p.ratingHistory[format] || p.ratingHistory[format].length === 0) continue;

    var points = p.ratingHistory[format]
      .slice()
      .sort(function(a, b) { return a.date - b.date; })
      .map(function(pt) { return { x: pt.date * 1000, y: pt.rating }; });

    // Filter by time range
    if (cutoff > 0) {
      points = points.filter(function(pt) { return pt.x >= cutoff; });
    }

    if (points.length === 0) continue;

    // Downsample if too many points (keep every Nth point)
    let sampled = points;
    if (points.length > 200) {
      const step = Math.ceil(points.length / 200);
      sampled = points.filter(function(_, idx) { return idx % step === 0; });
      if (sampled[sampled.length - 1] !== points[points.length - 1]) {
        sampled.push(points[points.length - 1]);
      }
    }

    datasets.push({
      label: PLAYERS[i],
      data: sampled,
      borderColor: PLAYER_COLORS[i % PLAYER_COLORS.length],
      backgroundColor: 'transparent',
      borderWidth: 1.5,
      pointRadius: 0,
      pointHitRadius: 6,
      tension: 0.1
    });
  }

  chartInstance.options.scales.x.time.unit = timeUnit;
  chartInstance.data.datasets = datasets;
  chartInstance.update();
}

// ===== RENDER: PERFORMANCE =====
function renderPerformance() {
  const el = document.getElementById('performance-body');
  let html = '';

  // Tactics
  html += '<div class="perf-section"><div class="perf-title">TACTICS RATINGS</div>';
  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const s = state.players[key] && state.players[key].stats;
    if (!s || !s.tactics) continue;
    const hi = s.tactics.highest ? s.tactics.highest.rating : '-';
    const lo = s.tactics.lowest ? s.tactics.lowest.rating : '-';
    html += '<div class="perf-row"><span class="perf-name">' + escapeHtml(truncate(username, 16)) +
      '</span><span class="amber">' + hi + '</span><span class="dim"> / ' + lo + '</span></div>';
  }
  html += '</div>';

  // Puzzle Rush
  html += '<div class="perf-section"><div class="perf-title">PUZZLE RUSH BEST</div>';
  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const s = state.players[key] && state.players[key].stats;
    if (!s || !s.puzzle_rush || !s.puzzle_rush.best) continue;
    const score = s.puzzle_rush.best.score;
    const total = s.puzzle_rush.best.total_attempts;
    html += '<div class="perf-row"><span class="perf-name">' + escapeHtml(truncate(username, 16)) +
      '</span><span class="green">' + score + '</span><span class="dim"> / ' + total + '</span></div>';
  }
  html += '</div>';

  // Win rates
  html += '<div class="perf-section"><div class="perf-title">WIN RATE (ALL FORMATS)</div>';
  for (const username of PLAYERS) {
    const key = username.toLowerCase();
    const s = state.players[key] && state.players[key].stats;
    if (!s) continue;
    let w = 0, l = 0, d = 0;
    for (const fmt of FORMATS) {
      if (s[fmt] && s[fmt].record) {
        w += s[fmt].record.win || 0;
        l += s[fmt].record.loss || 0;
        d += s[fmt].record.draw || 0;
      }
    }
    const total = w + l + d;
    const pct = total > 0 ? ((w / total) * 100).toFixed(1) : '0.0';
    const barWidth = total > 0 ? Math.round((w / total) * 100) : 0;
    html += '<div class="perf-row"><span class="perf-name">' + escapeHtml(truncate(username, 16)) +
      '</span><span class="green">' + pct + '%</span>' +
      '<div class="win-bar"><div class="win-bar-fill" style="width:' + barWidth + '%"></div></div></div>';
  }
  html += '</div>';

  el.innerHTML = html || '<div class="loading-text">Loading...</div>';
}

// ===== HEADER & STATUS BAR =====
function updateClock() {
  const now = new Date();
  const time = now.toLocaleTimeString('en-US', { hour12: false });
  const date = now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  const el = document.getElementById('header-clock');
  if (el) el.textContent = date + ' ' + time;
}

function updateCountdown() {
  const remaining = Math.max(0, Math.ceil((nextRefreshTime - Date.now()) / 1000));
  const el = document.getElementById('refresh-countdown');
  if (el) el.textContent = remaining;
}

function getCacheStatus() {
  let cached = 0;
  for (const u of PLAYERS) {
    if (loadArchiveCache(u.toLowerCase())) cached++;
  }
  return cached + '/' + PLAYERS.length + ' CACHED';
}

function updateStatusBar() {
  const bar = document.getElementById('status-bar');
  const errCount = state.errors.length;
  const lastErr = state.errors[state.errors.length - 1];
  const loading = state.archivesLoading ? ' | LOADING ARCHIVES...' : '';
  bar.innerHTML =
    '<span>API CALLS: ' + state.apiCallCount + '</span>' +
    '<span>CACHE: ' + getCacheStatus() + '</span>' +
    '<span class="' + (errCount > 0 ? 'red' : '') + '">ERRORS: ' + errCount +
      (lastErr ? ' | ' + escapeHtml(truncate(lastErr.msg, 40)) : '') + '</span>' +
    '<span>' + loading + '</span>';
}

// ===== CHART TABS =====
function setupChartTabs() {
  document.getElementById('chart-tabs').addEventListener('click', function(e) {
    const fmt = e.target.dataset.format;
    if (!fmt) return;
    state.selectedChartFormat = fmt;
    var tabs = document.querySelectorAll('#chart-tabs .tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    e.target.classList.add('active');
    renderChart();
  });
  document.getElementById('chart-range-tabs').addEventListener('click', function(e) {
    const range = e.target.dataset.range;
    if (!range) return;
    state.selectedChartRange = range;
    var tabs = document.querySelectorAll('#chart-range-tabs .tab');
    for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
    e.target.classList.add('active');
    renderChart();
    renderRatingsMatrix();
  });
}

// ===== GLOBAL ERROR HANDLER =====
window.addEventListener('unhandledrejection', function(event) {
  state.errors.push({ time: Date.now(), msg: String(event.reason) });
  updateStatusBar();
});

// ===== INIT =====
document.addEventListener('DOMContentLoaded', function() {
  updateClock();
  setInterval(updateClock, 1000);
  setInterval(updateCountdown, 1000);

  initChart();
  setupChartTabs();

  fetchProfilesAndStats().then(function() {
    fetchArchives();
  });

  setInterval(function() {
    fetchProfilesAndStats().then(function() {
      // profiles refreshed
    });
  }, REFRESH_INTERVAL_MS);

  setInterval(fetchArchives, ARCHIVE_REFRESH_MS);
});
</script>
